<app-auth-layout
  title="Welcome Back"
  subtitle="Enter your credentials to access your TaskHub workspace and boost your productivity."
>
  @if (errorMessage()) {
    <div class="auth-error-message" role="alert">
      <mat-icon class="error-icon">warning</mat-icon>
      <span class="error-text">{{ errorMessage() }}</span>
    </div>
  }

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
    <app-input
      [control]="loginForm.controls.email"
      label="Email Address"
      icon="email"
      placeholder="example@domain.com"
    ></app-input>

    <app-input
      [control]="loginForm.controls.password"
      label="Password"
      type="password"
      placeholder="Password"
    ></app-input>

    <div class="auth-actions-inline">
      <mat-checkbox class="example-margin">Remember me</mat-checkbox>
      <a href="#" class="forgot-link" (click)="$event.preventDefault()">Forgot password?</a>
    </div>

    <button
      mat-flat-button
      type="submit"
      [disabled]="loginForm.invalid || isLoading()"
      class="btn-submit"
    >
      @if (isLoading()) {
        <mat-spinner diameter="20" class="btn-spinner"></mat-spinner>
      } @else {
        Login <span class="arrow">&rarr;</span>
      }
    </button>
  </form>

  <div class="auth-divider">
    <span>OR CONTINUE WITH</span>
  </div>

  <app-social-login></app-social-login>

  <div class="auth-prompt">
    Don't have an account? <a routerLink="/register">Register</a>
  </div>
</app-auth-layout>
